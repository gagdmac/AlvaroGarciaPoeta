<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar Soneto — Álvaro García</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Shared head resources (fonts, Bootstrap, FA, shared CSS) -->
  <script src="components/head.js"></script>

  <!-- Page-specific styles -->
  <link rel="stylesheet" href="styles/publish.css">
</head>
<body>
  <!-- Header (skip-link + nav) -->
  <script src="components/header.js"></script>

  <!-- Main Content -->
  <main id="main-content">
    <section class="publish-section" aria-labelledby="publish-heading">
      <div class="publish-header">
        <span class="publish-header__overline" aria-hidden="true">Nuevo</span>
        <h1 id="publish-heading" class="publish-header__title">Publicar Soneto</h1>
        <p class="publish-header__subtitle">Escribe o pega un soneto de 14 versos</p>
      </div>

      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-8">
            <form id="sonnetForm" class="publish-form" novalidate>

              <!-- Password -->
              <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  autocomplete="current-password"
                  aria-describedby="password-hint password-error"
                >
                <span class="form-hint" id="password-hint">Contraseña de publicación</span>
                <div class="form-error" id="password-error" aria-live="assertive"></div>
              </div>

              <!-- Title -->
              <div class="form-group">
                <label for="title">Título del soneto</label>
                <input
                  type="text"
                  id="title"
                  name="title"
                  required
                  maxlength="200"
                  aria-describedby="title-error"
                >
                <div class="form-error" id="title-error" aria-live="assertive"></div>
              </div>

              <!-- Dedication -->
              <div class="form-group">
                <label for="dedication">
                  Dedicatoria
                  <span class="form-hint" style="display:inline; text-transform:none; letter-spacing:0; font-weight:400;">(opcional)</span>
                </label>
                <input
                  type="text"
                  id="dedication"
                  name="dedication"
                  maxlength="200"
                >
              </div>

              <!-- Sonnet body -->
              <div class="form-group">
                <label for="sonnet">Soneto</label>
                <span class="form-hint" id="sonnet-hint">14 versos, uno por línea. Dos cuartetos (4+4) y dos tercetos (3+3).</span>
                <textarea
                  id="sonnet"
                  name="sonnet"
                  required
                  aria-describedby="sonnet-hint verse-count sonnet-error"
                ></textarea>
                <div class="verse-counter" id="verse-count" aria-live="polite">0 / 14 versos</div>
                <div class="form-error" id="sonnet-error" aria-live="assertive"></div>
              </div>

              <!-- Submit -->
              <button type="submit" class="btn-publish" id="submit-btn">
                <i class="fas fa-feather-alt" aria-hidden="true"></i>
                Publicar Soneto
              </button>

              <!-- Status -->
              <div id="form-status" class="form-status" role="status" aria-live="polite"></div>
            </form>

            <!-- Live Preview -->
            <div class="preview-section" aria-labelledby="preview-heading">
              <h2 id="preview-heading" class="preview-heading">Vista previa</h2>
              <div class="preview-card" id="preview-card" aria-live="polite">
                <p class="preview-placeholder" id="preview-placeholder">
                  La vista previa se mostrará aquí al escribir el soneto.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Accessibility Options -->
  <script src="a11y-options.js" defer></script>

  <!-- Footer -->
  <script src="components/footer.js"></script>

  <script>
    (function () {
      'use strict';

      var form = document.getElementById('sonnetForm');
      var titleInput = document.getElementById('title');
      var dedicationInput = document.getElementById('dedication');
      var sonnetTextarea = document.getElementById('sonnet');
      var verseCounter = document.getElementById('verse-count');
      var previewCard = document.getElementById('preview-card');
      var previewPlaceholder = document.getElementById('preview-placeholder');
      var formStatus = document.getElementById('form-status');
      var submitBtn = document.getElementById('submit-btn');

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function getVerses() {
        return sonnetTextarea.value
          .split('\n')
          .filter(function (l) { return l.trim().length > 0; });
      }

      function updateVerseCounter() {
        var count = getVerses().length;
        verseCounter.textContent = count + ' / 14 versos';

        verseCounter.classList.remove('verse-counter--valid', 'verse-counter--invalid');
        if (count === 14) {
          verseCounter.classList.add('verse-counter--valid');
        } else if (count > 14) {
          verseCounter.classList.add('verse-counter--invalid');
        }
      }

      function updatePreview() {
        var title = titleInput.value.trim();
        var dedication = dedicationInput.value.trim();
        var verses = getVerses();

        if (!title && verses.length === 0) {
          previewPlaceholder.hidden = false;
          var existing = previewCard.querySelectorAll('.preview-card__title, .preview-card__dedication, .preview-card__stanza');
          existing.forEach(function (el) { el.remove(); });
          return;
        }

        previewPlaceholder.hidden = true;

        var old = previewCard.querySelectorAll('.preview-card__title, .preview-card__dedication, .preview-card__stanza');
        old.forEach(function (el) { el.remove(); });

        if (title) {
          var h = document.createElement('h3');
          h.className = 'preview-card__title';
          h.textContent = title;
          previewCard.insertBefore(h, previewPlaceholder);
        }

        if (dedication) {
          var d = document.createElement('p');
          d.className = 'preview-card__dedication';
          d.textContent = dedication;
          previewCard.insertBefore(d, previewPlaceholder);
        }

        var stanzaSlices = [
          verses.slice(0, 4),
          verses.slice(4, 8),
          verses.slice(8, 11),
          verses.slice(11, 14)
        ];

        stanzaSlices.forEach(function (stanza) {
          if (stanza.length === 0) return;
          var div = document.createElement('div');
          div.className = 'preview-card__stanza';
          stanza.forEach(function (verse) {
            var span = document.createElement('span');
            span.textContent = verse;
            div.appendChild(span);
          });
          previewCard.insertBefore(div, previewPlaceholder);
        });
      }

      sonnetTextarea.addEventListener('input', function () {
        updateVerseCounter();
        updatePreview();
      });

      titleInput.addEventListener('input', updatePreview);
      dedicationInput.addEventListener('input', updatePreview);

      function clearErrors() {
        var errors = form.querySelectorAll('.form-error');
        errors.forEach(function (el) { el.textContent = ''; });

        var inputs = form.querySelectorAll('[aria-invalid]');
        inputs.forEach(function (el) { el.removeAttribute('aria-invalid'); });

        formStatus.className = 'form-status';
        formStatus.textContent = '';
      }

      function showFieldError(inputEl, errorEl, message) {
        inputEl.setAttribute('aria-invalid', 'true');
        errorEl.textContent = message;
      }

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        clearErrors();

        var password = document.getElementById('password').value;
        var title = titleInput.value.trim();
        var dedication = dedicationInput.value.trim();
        var verses = getVerses();

        var hasError = false;

        if (!title) {
          showFieldError(titleInput, document.getElementById('title-error'), 'El título es obligatorio.');
          hasError = true;
        }

        if (verses.length !== 14) {
          showFieldError(
            sonnetTextarea,
            document.getElementById('sonnet-error'),
            'El soneto debe tener exactamente 14 versos. Tiene ' + verses.length + '.'
          );
          hasError = true;
        }

        if (!password) {
          showFieldError(
            document.getElementById('password'),
            document.getElementById('password-error'),
            'La contraseña es obligatoria.'
          );
          hasError = true;
        }

        if (hasError) {
          var firstInvalid = form.querySelector('[aria-invalid="true"]');
          if (firstInvalid) firstInvalid.focus();
          return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin" aria-hidden="true"></i> Publicando…';

        try {
          var res = await fetch('/api/publish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              password: password,
              title: title,
              dedication: dedication,
              sonnet: sonnetTextarea.value.trim()
            })
          });

          if (res.ok) {
            formStatus.className = 'form-status form-status--success';
            formStatus.textContent = '¡Soneto publicado! Aparecerá en la web en unos minutos.';
            form.reset();
            updateVerseCounter();
            updatePreview();
          } else {
            var errText = await res.text();
            formStatus.className = 'form-status form-status--error';
            formStatus.textContent = 'Error: ' + errText;
          }
        } catch (err) {
          formStatus.className = 'form-status form-status--error';
          formStatus.textContent = 'Error de conexión. Inténtalo de nuevo.';
        } finally {
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<i class="fas fa-feather-alt" aria-hidden="true"></i> Publicar Soneto';
        }
      });
    })();
  </script>
</body>
</html>
