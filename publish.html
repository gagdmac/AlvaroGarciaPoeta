<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar Soneto — Álvaro García</title>
  <meta name="robots" content="noindex, nofollow">

  <!-- Shared head resources (fonts, Bootstrap, FA, shared CSS) -->
  <script src="components/head.js"></script>

  <!-- Page-specific styles -->
  <link rel="stylesheet" href="styles/publish.css">
</head>
<body>
  <!-- Header (skip-link + nav) -->
  <script src="components/header.js"></script>

  <!-- Main Content -->
  <main id="main-content">
    <section class="publish-section" aria-labelledby="publish-heading">
      <div class="publish-header">
        <span class="publish-header__overline" aria-hidden="true">Nuevo</span>
        <h1 id="publish-heading" class="publish-header__title">Publicar Soneto</h1>
        <p class="publish-header__subtitle">Escribe o pega un soneto de 14 versos</p>
      </div>

      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-10 col-lg-8">
            <form id="sonnetForm" class="publish-form" novalidate>

              <!-- Password -->
              <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  required
                  autocomplete="current-password"
                  aria-describedby="password-hint password-error"
                >
                <span class="form-hint" id="password-hint">Contraseña de publicación</span>
                <div class="form-error" id="password-error" aria-live="assertive"></div>
              </div>

              <!-- Title -->
              <div class="form-group">
                <label for="title">Título del soneto</label>
                <input
                  type="text"
                  id="title"
                  name="title"
                  required
                  maxlength="200"
                  aria-describedby="title-error"
                >
                <div class="form-error" id="title-error" aria-live="assertive"></div>
              </div>

              <!-- Dedication -->
              <div class="form-group">
                <label for="dedication">
                  Dedicatoria
                  <span class="form-hint" style="display:inline; text-transform:none; letter-spacing:0; font-weight:400;">(opcional)</span>
                </label>
                <input
                  type="text"
                  id="dedication"
                  name="dedication"
                  maxlength="200"
                >
              </div>

              <!-- Sonnet body -->
              <div class="form-group">
                <label for="sonnet">Soneto</label>
                <span class="form-hint" id="sonnet-hint">14 versos, uno por línea. Dos cuartetos (4+4) y dos tercetos (3+3).</span>
                <textarea
                  id="sonnet"
                  name="sonnet"
                  required
                  aria-describedby="sonnet-hint verse-count sonnet-error"
                ></textarea>
                <div class="verse-counter" id="verse-count" aria-live="polite">0 / 14 versos</div>
                <div class="form-error" id="sonnet-error" aria-live="assertive"></div>
              </div>

              <!-- Submit -->
              <button type="submit" class="btn-publish" id="submit-btn">
                <i class="fas fa-feather-alt" aria-hidden="true"></i>
                Publicar Soneto
              </button>

              <!-- Status -->
              <div id="form-status" class="form-status" role="status" aria-live="polite"></div>
            </form>

            <!-- Live Preview -->
            <div class="preview-section" aria-labelledby="preview-heading">
              <h2 id="preview-heading" class="preview-heading">Vista previa</h2>
              <div class="preview-card" id="preview-card" aria-live="polite">
                <p class="preview-placeholder" id="preview-placeholder">
                  La vista previa se mostrará aquí al escribir el soneto.
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Accessibility Options -->
  <script src="a11y-options.js" defer></script>

  <!-- Footer -->
  <script src="components/footer.js"></script>

  <!-- Publish Form Handler -->
  <script src="scripts/publish.js"></script>
</body>
</html>
