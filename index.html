<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álvaro García — Sonetos</title>
  <meta name="description" content="Colección de sonetos de Álvaro García. Poesía en verso clásico.">
  <meta name="author" content="Álvaro García">
  <link rel="canonical" href="https://alvaro-garcia-poeta.pages.dev/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Álvaro García — Sonetos">
  <meta property="og:description" content="Colección de sonetos de Álvaro García. Poesía en verso clásico.">
  <meta property="og:url" content="https://alvaro-garcia-poeta.pages.dev/">
  <meta property="og:site_name" content="Álvaro García — Poeta">
  <meta property="og:locale" content="es_ES">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Álvaro García — Sonetos">
  <meta name="twitter:description" content="Colección de sonetos de Álvaro García. Poesía en verso clásico.">

  <!-- Prevent FOUC (Flash of Unstyled Content) by applying theme immediately -->
  <script>
    (function() {
      try {
        var saved = JSON.parse(localStorage.getItem('a11y-options'));
        var lightMode = saved && saved.lightMode;
        if (lightMode === 'light') {
          document.documentElement.style.colorScheme = 'light';
        } else if (lightMode === 'dark') {
          document.documentElement.style.colorScheme = 'dark';
        }
      } catch (e) { /* ignore */ }
    })();
  </script>

  <!-- Shared head resources (fonts, Bootstrap, FA, shared CSS) -->
  <script src="components/head.js"></script>

  <!-- Page-specific styles -->
  <link rel="stylesheet" href="styles/index.css">
</head>
<body>
  <!-- Hero -->
  <header class="hero" role="banner">
    <span class="hero__overline" aria-hidden="true">Sonetos</span>
    <h1 class="hero__title">Álvaro García</h1>
    <p class="hero__subtitle"><em>BIO</em></p>
    <span class="hero__ornament" aria-hidden="true"></span>
  </header>

  <!-- Navigation (sticky below hero) -->
  <script src="components/header.js"></script>

  <!-- Main -->
  <main id="main-content">
    <section class="sonnets-section" aria-labelledby="sonnets-heading">
      <h2 id="sonnets-heading" class="section-label">Colección</h2>
      <div aria-live="polite" aria-atomic="true" class="sr-only" id="sonnets-status"></div>

      <div class="container">
        <div class="masonry-grid" id="sonnets-grid"></div>
      </div>

      <div class="empty-state" id="empty-state" hidden>
        <div class="empty-state__icon" aria-hidden="true"><i class="fas fa-feather-alt"></i></div>
        <p class="empty-state__text">Aún no hay sonetos publicados.</p>
      </div>
    </section>
  </main>

  <!-- Accessibility Options -->
  <script src="a11y-options.js" defer></script>

  <!-- Footer -->
  <script src="components/footer.js"></script>

  <!-- Sonnets Loader -->
  <script src="scripts/index.js"></script>
</body>
</html>
